  }
  * { box-sizing: border-box; }
  body { margin:0; font-family: -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif; background:var(--bg); color:var(--text); }
  header { background:var(--navy); color:#fff; padding:20px 16px 16px; position:sticky; top:0; z-index:5; }
  header h1 { margin:0 0 4px; font-size:1.15rem; letter-spacing:.02em; }
  header p { margin:0; font-size:.8rem; color:#cfd6e6; }
  .controls { display:flex; gap:8px; padding:12px 16px; background:var(--bg); position:sticky; top:64px; z-index:4; flex-wrap:wrap; border-bottom:1px solid var(--line); }
  select, input { border:1px solid var(--line); border-radius:8px; padding:8px 10px; font-size:.85rem; background:#fff; color:var(--text); }

  main { padding:8px 16px 40px; max-width:640px; margin:0 auto; }
  .card { background:#fff; border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin:10px 0; box-shadow:0 1px 2px rgba(0,0,0,.03); }

  .phone a { color:var(--navy); text-decoration:none; }
  .addr, .city { font-size:.8rem; color:var(--gray); margin-top:2px; }
  .empty, .status { text-align:center; color:var(--gray); padding:40px 0; font-size:.9rem; }
  footer { text-align:center; font-size:.75rem; color:var(--gray); padding:20px; }
  .emergency { background:#fff5f5; border:1px solid #f3c9c9; color:#8a1f1f; font-size:.8rem; padding:8px 12px; border-radius:8px; margin:10px 16px 0; text-align:center; }

// Minimal CSV parser that handles quoted fields with embedded commas
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i + 1];
    if (inQuotes) {
      if (ch === '"' && next === '"') { field += '"'; i++; }
      else if (ch === '"') { inQuotes = false; }
      else { field += ch; }
    } else {
      if (ch === '"') inQuotes = true;
      else if (ch === ',') { row.push(field); field = ''; }
      else if (ch === '\n' || ch === '\r') {
        if (ch === '\r' && next === '\n') i++;
        row.push(field); field = '';
        if (row.length > 1 || row[0] !== '') rows.push(row);
        row = [];
      } else field += ch;
    }
  }
  if (field !== '' || row.length) { row.push(field); rows.push(row); }
  if (!rows.length) return [];

  // Map whatever header text the sheet actually uses onto our standard
  // field names, so the sheet doesn't need to be renamed.
  const ALIASES = {
    name: ['name', 'society / organization', 'society/organization', 'organization', 'society'],
    phone: ['phone', 'phone number', 'contact'],
    address: ['address', 'location'],
    city: ['city', 'town / city', 'town/city', 'town'],
    type: ['type', 'category']
  };
  function normalize(h) {
    const clean = h.trim().toLowerCase();
    for (const [field, variants] of Object.entries(ALIASES)) {
      if (variants.includes(clean)) return field;
    }
    return clean;
  }

  const headers = rows[0].map(normalize);
  return rows.slice(1).filter(r => r.some(v => v.trim() !== '')).map(r => {
    const obj = {};
    headers.forEach((h, idx) => obj[h] = (r[idx] || '').trim());
    return obj;
  });
}

let DATA = FALLBACK_DATA;

const listEl = document.getElementById('list');
const searchEl = document.getElementById('search');
const cityEl = document.getElementById('cityFilter');
const typeEl = document.getElementById('typeFilter');

function uniqueSorted(arr) { return [...new Set(arr)].filter(Boolean).sort(); }

function populateFilters() {
  cityEl.innerHTML = '<option value="">All cities</option>';
  typeEl.innerHTML = '<option value="">All types</option>';
  uniqueSorted(DATA.map(d => d.city)).forEach(c => {
    const o = document.createElement('option'); o.value = c; o.textContent = c;
    cityEl.appendChild(o);
  });
  uniqueSorted(DATA.map(d => d.type)).forEach(t => {
    const o = document.createElement('option'); o.value = t; o.textContent = t;
    typeEl.appendChild(o);
  });
}

function render() {
  const q = searchEl.value.trim().toLowerCase();
  const city = cityEl.value;
  const type = typeEl.value;
  const filtered = DATA.filter(d => {
    const matchesQ = !q || (d.name || '').toLowerCase().includes(q) || (d.address || '').toLowerCase().includes(q);
    const matchesCity = !city || d.city === city;
    const matchesType = !type || d.type === type;
    return matchesQ && matchesCity && matchesType;
  });
  listEl.innerHTML = '';
  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="empty">No matches. Try clearing a filter.</div>';
    return;
  }
  filtered.forEach(d => {
    const card = document.createElement('div');
    card.className = 'card';
    const telHref = 'tel:' + (d.phone || '').split('/')[0].replace(/[^0-9+]/g, '');
    card.innerHTML = `
      <span class="tag">${d.type || ''}</span>
      <h3>${d.name || ''}</h3>
      <div class="phone"><a href="${telHref}">${d.phone || ''}</a></div>
      <div class="addr">${d.address || ''}</div>
      <div class="city">${d.city || ''}</div>
    `;
    listEl.appendChild(card);
  });
}

function init() {
  populateFilters();
  render();
  searchEl.addEventListener('input', render);
  cityEl.addEventListener('change', render);
  typeEl.addEventListener('change', render);
}

if (SHEET_CSV_URL) {
  fetch(SHEET_CSV_URL)
    .then(r => { if (!r.ok) throw new Error('Network response was not ok'); return r.text(); })
    .then(csvText => {
      const rows = parseCSV(csvText);
      if (rows.length) DATA = rows;
      init();
    })
    .catch(err => {
      console.warn('Could not load Google Sheet, using fallback data:', err);
      init();
    });
} else {
  init();
}
